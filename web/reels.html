<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reels Generator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
    padding: 20px;
}

input, button, textarea {
    padding: 10px;
    margin: 10px;
    width: 320px;
    border-radius: 8px;
    border: none;
}

button {
    background: #ff0050;
    color: white;
    cursor: pointer;
}

textarea {
    height: 120px;
    resize: none;
}

canvas {
    margin-top: 20px;
    border-radius: 12px;
    max-width: 300px;
}
</style>
</head>

<body>

<h2>FB Reels Image Generator</h2>

<input type="text" id="url" placeholder="Unesi link">
<br>
<button onclick="generate()">Generiši</button>
<button onclick="copyText()">Kopiraj tekst</button>

<br>
<textarea id="outputText" placeholder="Tekst će biti ovdje..."></textarea>

<br>
<canvas id="canvas" width="1080" height="1920"></canvas>

<script>

// proxy lista
const proxies = [
    url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://thingproxy.freeboard.io/fetch/${url}`
];

// poruke za kraj
const endings = [
    "NASTAVAK PRIČE U KOMENTARU 👇👇👇",
    "ČITAJ dalje u komentaru 👇👇👇",
    "OSTATAK PRICE PROCITAJTE NA LINKU U KOMENTARU ⬇️⬇️⬇️",
    "NASTAVAK U KOMENTARU 👇👇👇",
    "ČITAJTE NA LINKU U KOMENTARU 👇👇👇"
];

// timeout
function fetchWithTimeout(resource, timeout = 8000) {
    return Promise.race([
        fetch(resource),
        new Promise((_, reject) =>
            setTimeout(() => reject(new Error("Timeout")), timeout)
        )
    ]);
}

async function fetchFromProxies(url) {
    for (let proxy of proxies) {
        try {
            const proxyUrl = proxy(url);
            const res = await fetchWithTimeout(proxyUrl);

            let text;

            if (proxyUrl.includes("allorigins")) {
                const data = await res.json();
                text = data.contents;
            } else {
                text = await res.text();
            }

            if (text && text.length > 100) return text;

        } catch (e) {}
    }
    throw new Error("Nijedan proxy ne radi");
}

async function generate() {
    const url = document.getElementById("url").value;

    try {
        let html = await fetchFromProxies(url);

        let stopIndex = html.indexOf("<!--STOP TEXT HERE-->");
        let content = stopIndex !== -1 ? html.substring(0, stopIndex) : html;

        let text = content.replace(/<[^>]*>/g, "").trim();

        // skrati tekst
        text = text.substring(0, 350);

        // dodaj random završetak
        const randomEnding = endings[Math.floor(Math.random() * endings.length)];
        text += "\n\n" + randomEnding;

        // prikaži u textarea
        document.getElementById("outputText").value = text;

        drawImage(text);

    } catch (e) {
        alert("Greška: " + e.message);
    }
}

function copyText() {
    const textarea = document.getElementById("outputText");
    textarea.select();
    document.execCommand("copy");
    alert("Tekst kopiran!");
}

function drawImage(text) {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, "rgba(0,0,0,0.3)");
    gradient.addColorStop(1, "rgba(0,0,0,0.9)");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 60px Arial";
    ctx.textAlign = "center";

    wrapText(ctx, text, canvas.width / 2, 300, 900, 80);
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = text.split(" ");
    let line = "";

    for (let n = 0; n < words.length; n++) {
        const testLine = line + words[n] + " ";
        const testWidth = ctx.measureText(testLine).width;

        if (testWidth > maxWidth && n > 0) {
            ctx.fillText(line, x, y);
            line = words[n] + " ";
            y += lineHeight;
        } else {
            line = testLine;
        }
    }
    ctx.fillText(line, x, y);
}

</script>

</body>
</html>
