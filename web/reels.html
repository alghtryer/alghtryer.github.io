<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reels Generator PRO</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: #fff;
    text-align: center;
    padding: 20px;
}

input, button, textarea {
    padding: 10px;
    margin: 10px;
    width: 320px;
    border-radius: 8px;
    border: none;
}

button {
    background: #ff0050;
    color: white;
    cursor: pointer;
}

textarea {
    height: 120px;
}

canvas {
    margin-top: 20px;
    border-radius: 12px;
    max-width: 300px;
}
</style>
</head>

<body>

<h2>🔥 Reels Generator PRO</h2>

<input type="text" id="url" placeholder="Unesi link">
<br>
<button onclick="generate()">Generiši</button>
<button onclick="copyText()">Kopiraj tekst</button>

<br>
<textarea id="outputText"></textarea>

<br>
<canvas id="canvas" width="1080" height="1920"></canvas>

<script>

// ========================
// 🔥 PROXY SYSTEM
// ========================

const proxies = [
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u => `https://thingproxy.freeboard.io/fetch/${u}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
];

async function fetchHTML(url){

for(const p of proxies){
try{
const r = await fetch(p(url));
const t = await r.text();
if(t && t.length > 800) return t;
}catch(e){}
}

throw new Error("Proxy fail");
}

// ========================
// 🔥 ENDINGS
// ========================

const endings = [
"NASTAVAK PRIČE U KOMENTARU 👇👇👇",
"ČITAJ dalje u komentaru 👇👇👇",
"OSTATAK PRICE PROCITAJTE NA LINKU U KOMENTARU ⬇️⬇️⬇️",
"NASTAVAK U KOMENTARU 👇👇👇",
"ČITAJTE NA LINKU U KOMENTARU 👇👇👇"
];

// ========================
// 🔥 MAIN
// ========================

async function generate(){

const url = document.getElementById("url").value;

try{

const html = await fetchHTML(url);
const doc = new DOMParser().parseFromString(html, 'text/html');

let contentDiv = doc.querySelector('.post-body.entry-content.float-container')
|| doc.querySelector('.entry-content')
|| doc.querySelector('article');

if(!contentDiv){
alert("Nema teksta");
return;
}

// ========================
// 🔥 UZMI DO STOP
// ========================

function takeUntilStop(node){

const fragment = document.createDocumentFragment();
let stop = false;

function walk(current, parent){

if(stop) return;

// STOP komentar
if(current.nodeType === 8 && current.nodeValue.includes('STOP TEXT HERE')){
stop = true;
return;
}

// ukloni reklame
if(current.nodeType === 1){
const el = current;

if(
el.tagName === "SCRIPT" ||
el.tagName === "STYLE" ||
el.tagName === "IFRAME" ||
el.className?.toLowerCase().includes("ads") ||
el.className?.toLowerCase().includes("banner") ||
el.innerText?.toLowerCase().includes("google") ||
el.innerText?.toLowerCase().includes("oglas")
){
return;
}
}

const clone = current.cloneNode(false);
parent.appendChild(clone);

current.childNodes.forEach(child=>{
if(!stop) walk(child, clone);
});
}

node.childNodes.forEach(child=>walk(child, fragment));

return fragment;
}

const container = document.createElement('div');
container.appendChild(takeUntilStop(contentDiv));

// dodatno čišćenje
container.querySelectorAll(`
script,style,iframe,ins,
.adsbygoogle,
[class*="ads"],
[class*="banner"]
`).forEach(e=>e.remove());

let text = container.innerText;

// očisti smeće
text = text
.replace(/Tekst se nastavlja ispod oglasa/gi,'')
.replace(/Oglas/gi,'')
.trim();

// skrati za reels
text = text.substring(0, 350);

// dodaj završetak
const endMsg = endings[Math.floor(Math.random()*endings.length)];
text += "\n\n" + endMsg;

// prikaži
document.getElementById("outputText").value = text;

// napravi sliku
drawImage(text);

}catch(e){
alert("Greška: " + e.message);
}
}

// ========================
// 🔥 COPY
// ========================

function copyText(){
const t = document.getElementById("outputText");
t.select();
document.execCommand("copy");
alert("Kopirano!");
}

// ========================
// 🔥 CANVAS
// ========================

function drawImage(text){

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

ctx.fillStyle = "#000";
ctx.fillRect(0, 0, canvas.width, canvas.height);

const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
gradient.addColorStop(0, "rgba(0,0,0,0.3)");
gradient.addColorStop(1, "rgba(0,0,0,0.9)");

ctx.fillStyle = gradient;
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.fillStyle = "#fff";
ctx.font = "bold 60px Arial";
ctx.textAlign = "center";

wrapText(ctx, text, canvas.width/2, 300, 900, 80);
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight){

const words = text.split(" ");
let line = "";

for(let n=0;n<words.length;n++){

const testLine = line + words[n] + " ";
const testWidth = ctx.measureText(testLine).width;

if(testWidth > maxWidth && n > 0){
ctx.fillText(line, x, y);
line = words[n] + " ";
y += lineHeight;
}else{
line = testLine;
}
}

ctx.fillText(line, x, y);
}

</script>

</body>
</html>
