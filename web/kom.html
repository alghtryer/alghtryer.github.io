<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Poruke</title>
<style>
    body{
        font-family: Verdana, sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 20px;
        background: #f5f5f5;
    }

    .box{
        background: white;
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 20px;
    }

    .message{
        margin-bottom: 15px;
        font-size: 18px;
        line-height: 1.5;
    }

    button{
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover{
        opacity: 0.9;
    }
</style>
</head>
<body>

<div class="box">
    <div class="message" id="msg1">
        Pokaži svoju podršku tako što ćeš dati “Sviđa mi se” i podijeliti ovu objavu! Klikni “DA” ako želiš pročitati cijelu priču…
    </div>
    <button onclick="copyText('msg1')">Copy</button>
</div>

<div class="box">
    <div class="message" id="msg2">
        RECI "DA" AKO ŽELIŠ PROČITATI CIJELU PRIČU!! 👇
    </div>
    <button onclick="copyText('msg2')">Copy</button>
</div>

<script>
function copyText(id){
    let text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert("Tekst kopiran!");
    });
}
</script>

</body>
</html>
