<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Extractor PRO</title>

<style>
body{font-family:Arial,sans-serif;max-width:1000px;margin:auto;padding:20px;background:#f5f5f5}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1);margin-top:20px}
input,button,textarea{width:100%;padding:12px;margin-top:10px;font-size:16px;border-radius:8px;border:1px solid #ccc}
button{cursor:pointer;font-weight:bold;background:#111;color:#fff}
.label{font-weight:bold;margin-top:15px;display:block}
.preview{border:1px solid #ddd;padding:15px;border-radius:8px;margin-top:10px;line-height:1.6;font-family:Verdana}
.small{font-size:12px;color:#666}
</style>
</head>

<body>

<div class="card">
<h2>URL Extractor PRO (MGID + SEO + Auto)</h2>

<label><input type="radio" name="mode" value="manual" checked> Manual URL</label>
<label><input type="radio" name="mode" value="auto"> Auto (zanimljivosti.xyz)</label>

<input id="urlInput" placeholder="Zalijepi URL...">
<input id="countInput" type="number" placeholder="Broj članaka (auto mode)" style="display:none">

<button onclick="loadData()">Učitaj sadržaj</button>

<div id="result"></div>
</div>

<script>
const urlInput=document.getElementById("urlInput");
const countInput=document.getElementById("countInput");
const result=document.getElementById("result");

let postCounter=0;

// MODE SWITCH

document.querySelectorAll('input[name="mode"]').forEach(r=>{
r.addEventListener("change",()=>{
urlInput.style.display=r.value==="manual"?"block":"none";
countInput.style.display=r.value==="auto"?"block":"none";
});
});

// FETCH

async function fetchHTML(url){
try{
const r=await fetch(url,{cache:"no-store"});
return await r.text();
}catch(e){throw "Fetch error"}
}

// CLEAN

function cleanContent(container){
container.querySelectorAll('script,style,iframe,ins,.adsbygoogle').forEach(e=>e.remove());
return container.innerText.trim();
}

// MGID INJECT (PRO METHOD)

function insertMGID(container,id){
const wrap=document.createElement("div");
wrap.innerHTML=`<div data-type="_mgwidget" data-widget-id="${id}"></div>`;
container.appendChild(wrap);

const script=document.createElement("script");
script.text=`(function(w,q){w[q]=w[q]||[];w[q].push(["_mgc.load"])})(window,"_mgq");`;
container.appendChild(script);
}

// MAIN PROCESS

async function processSingle(url){

const html=await fetchHTML(url);
const doc=new DOMParser().parseFromString(html,'text/html');

const title=doc.querySelector('meta[property="og:title"]')?.content||doc.title||'';
const image=doc.querySelector('meta[property="og:image"]')?.content||'';

let content=doc.querySelector('.entry-content')||doc.querySelector('article');

const box=document.createElement("div");
box.className="card";

const contentWrap=document.createElement("div");

let text="Nema sadržaja";

if(content){
const tmp=document.createElement("div");
tmp.innerHTML=content.innerHTML;
text=cleanContent(tmp);
}

const paragraphs=text.split(/\n+/).filter(Boolean);

contentWrap.innerHTML="";

paragraphs.forEach((p,i)=>{
const el=document.createElement("p");
el.textContent=p;
contentWrap.appendChild(el);

if(i===Math.floor(paragraphs.length*0.25)) insertMGID(contentWrap,"1113798");
if(i===Math.floor(paragraphs.length*0.5)) insertMGID(contentWrap,"1674325");
if(i===Math.floor(paragraphs.length*0.75)) insertMGID(contentWrap,"1689711");
});

box.innerHTML=`
<span class="label">URL</span>
<input value="${url}">

<span class="label">OG Title</span>
<input value="${title}">

<span class="label">OG Image</span>
${image?`<img src="${image}" style="max-width:100%">`:''}

<span class="label">Preview (MGID PRO)</span>
`;

box.appendChild(contentWrap);

result.appendChild(box);
}

// LOAD

async function loadData(){
result.innerHTML="";
const mode=document.querySelector('input[name="mode"]:checked').value;

if(mode==="manual"){
await processSingle(urlInput.value.trim());
}

if(mode==="auto"){
const count=parseInt(countInput.value);
if(!count) return alert("Unesi broj");

const html=await fetchHTML("https://www.zanimljivosti.xyz/");
const doc=new DOMParser().parseFromString(html,'text/html');

let links=[...doc.querySelectorAll('a')]
.map(a=>a.href)
.filter(h=>h.includes("zanimljivosti.xyz/202"));

links=[...new Set(links)].slice(0,count);

for(let l of links){
await processSingle(l);
}
}
}

</script>

</body>
</html>
