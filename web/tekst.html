<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Text & Blogger MGID Converter PRO</title>
    <style>
        body{ font-family:Arial,sans-serif; max-width:900px; margin:auto; padding:20px; background:#f5f5f5 }
        .card{ background:#fff; padding:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.1); margin-top:20px }
        input,button,textarea{ width:100%; padding:12px; margin-top:10px; font-size:16px; border-radius:8px; border:1px solid #ccc; box-sizing: border-box; }
        button{ cursor:pointer; font-weight:bold; background: #007bff; color: white; border: none; }
        button:hover{ background: #0056b3; }
        .label{ font-weight:bold; margin-top:15px; display:block }
        .preview{ border:1px solid #ddd; padding:15px; border-radius:8px; margin-top:10px; line-height:1.6; background:#fafafa; max-height: 300px; overflow-y: auto; }
        .copyBtn{ background:#111; color:#fff; border:none; margin-top:8px }
        img{ max-width:100% }
        textarea{ height: 200px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h2>URL Extractor → Blogger MGID PRO</h2>
    <label><input type="radio" name="mode" value="manual" checked> Manual URL</label>
    <label><input type="radio" name="mode" value="auto"> Auto – zanimljivosti.xyz</label>

    <input id="urlInput" placeholder="Zalijepi URL...">
    <input id="countInput" type="number" placeholder="Broj tekstova" style="display:none">

    <button onclick="loadData()">Učitaj sadržaj</button>

    <div id="result"></div>
</div>

<script>
// Definiranje elemenata
const urlInput = document.getElementById('urlInput');
const countInput = document.getElementById('countInput');
const result = document.getElementById('result');
let postCounter = 0;

// ======================== FETCH ========================
async function fetchHTML(url){
    const proxies = [
        u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
        u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`
    ];

    for(const p of proxies){
        try {
            const r = await fetch(p(url));
            const t = await r.text();
            if(t && t.length > 800) return t;
        } catch(e) { console.error("Proxy error", e); }
    }
    throw "FETCH FAIL - Provjerite URL ili Proxy";
}

// ================= CLEAN =================
function cleanContent(container){
    container.querySelectorAll('script,style,iframe,ins,header,footer,nav,aside').forEach(e => e.remove());
    return container.innerHTML.trim();
}

// Mode switch
document.querySelectorAll('input[name="mode"]').forEach(r => {
    r.addEventListener("change", () => {
        urlInput.style.display = r.value === "manual" ? "block" : "none";
        countInput.style.display = r.value === "auto" ? "block" : "none";
    });
});

// ================= LOAD =================
async function loadData(){
    result.innerHTML = "Učitavam...";
    const mode = document.querySelector('input[name="mode"]:checked').value;

    try {
        if(mode === "manual"){
            const val = urlInput.value.trim();
            if(!val) { alert("Unesi URL!"); return; }
            await processSingle(val);
        } else {
            alert("Auto mode skraćen u ovoj verziji.");
            result.innerHTML = "";
        }
    } catch (err) {
        result.innerHTML = `<b style="color:red">Greška: ${err}</b>`;
    }
}

// ================= MGID ADS =================
function mgidAds(){
    return `
<div data-type="_mgwidget" data-widget-id="1113798"></div>
<div data-type="_mgwidget" data-widget-id="1674325"></div>
<div data-type="_mgwidget" data-widget-id="1689711"></div>
<script>(function(w,q){w[q]=w[q]||[];w[q].push(["_mgc.load"])})(window,"_mgq");<\/script>`;
}

// ================= BLOGGER BUILDER =================
function buildBloggerHTML(html){
    const temp = document.createElement("div");
    temp.innerHTML = html;
    const text = temp.innerText;
    const words = text.split(/\s+/);
    const total = words.length;

    const a1 = Math.floor(total * 0.25);
    const a2 = Math.floor(total * 0.50);
    const a3 = Math.floor(total * 0.75);

    let out = [];
    let buf = [];

    const ad = () => `<div style="margin:20px 0;">${mgidAds()}</div>`;

    words.forEach((w, i) => {
        buf.push(w);
        if(i === a1 || i === a2 || i === a3){
            out.push(buf.join(" "));
            out.push(ad());
            buf = [];
        }
    });
    out.push(buf.join(" "));

    return `<div style="font-family:Verdana; font-size:16px; line-height:1.7;">${out.join("<br><br>")}</div>`;
}

// ================= SINGLE =================
async function processSingle(url){
    const html = await fetchHTML(url);
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    const title = doc.querySelector('meta[property="og:title"]')?.content || doc.title;

    let content = doc.querySelector('.post-body.entry-content') || 
                  doc.querySelector('.entry-content') || 
                  doc.querySelector('article');

    let clean = "";
    if(content){
        const c = document.createElement("div");
        c.innerHTML = content.innerHTML;
        clean = cleanContent(c);
    } else {
        clean = "Sadržaj nije pronađen. Provjerite selektore.";
    }

    const bloggerHTML = buildBloggerHTML(clean);
    const id = postCounter++;
    
    result.innerHTML = ""; // Briše "Učitavam..."
    
    const box = document.createElement("div");
    box.className = "card";
    box.innerHTML = `
        <span class="label">Title:</span>
        <input value="${title}">
        <span class="label">Preview:</span>
        <div class="preview">${clean}</div>
        <span class="label">Blogger HTML (VERDANA + MGID ADS):</span>
        <textarea id="b${id}">${bloggerHTML.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
        <button class="copyBtn" onclick="copyHTML('b${id}')">Copy Blogger HTML</button>
    `;
    result.appendChild(box);
}

// ================= COPY =================
function copyHTML(id){
    const el = document.getElementById(id);
    el.select();
    document.execCommand("copy");
    alert("Kopirano!");
}
</script>

</body>
</html>
